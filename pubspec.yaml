name: agriscan
description: AgriScan AI — Détection des maladies des plantes
version: 4.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Fonts
  google_fonts: ^6.1.0

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # Permissions
  permission_handler: ^11.3.0

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Storage local
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3          # ← Base de données locale SQLite
  path: ^1.9.0             # ← Chemins de fichiers

  # Utils
  intl: ^0.19.0
  path_provider: ^2.1.3
  uuid: ^4.3.3             # ← Génération d'IDs uniques

  # API
  http: ^1.2.0

  # Cloud (Supabase)
  supabase_flutter: ^2.3.0  # ← Auth + sync cloud
  tflite_flutter: ^0.12.1

  video_player: ^2.9.2
  video_thumbnail: ^0.5.3

  file_picker: ^8.1.2
  speech_to_text: ^7.0.0

  #llm
  flutter_gemma: ^0.16.4
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/models/